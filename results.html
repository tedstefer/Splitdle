<!DOCTYPE html>
<html>
  <head>
    <title>Splitdle Results</title>
    <link rel="stylesheet" href="../style.css">
    <style>
      .results-container {
        max-width: 480px;
        margin: 60px auto;
        padding: 0 20px;
        text-align: center;
      }
      .copy-block {
        background-color: #0f0f0f;
        border: 1px solid #333;
        border-radius: 8px;
        padding: 16px;
        font-family: monospace;
        font-size: 13px;
        color: #ffffff;
        white-space: pre-line;
        text-align: left;
        margin-bottom: 16px;
        line-height: 1.8;
      }
      .copy-btn {
        width: 100%;
        padding: 12px;
        background-color: #e94560;
        color: white;
        border: none;
        border-radius: 8px;
        font-size: 15px;
        cursor: pointer;
        margin-bottom: 24px;
      }
      .copy-btn:hover {
        background-color: #c73652;
      }
      .copy-btn.copied {
        background-color: #333;
        color: #aaaaaa;
      }
      .support-link {
        display: block;
        text-align: center;
        color: #555;
        font-size: 12px;
        text-decoration: none;
        margin-top: 8px;
      }
      .support-link:hover {
        color: #aaaaaa;
      }
    </style>
  </head>
  <body>
    <div class="results-container">

      <h1 style="color:#e94560;letter-spacing:4px;margin-bottom:6px;">Splitdle</h1>
      <a href="#" class="support-link" style="margin-bottom:32px;display:block;">Support Us!</a>

      <div class="copy-block" id="copyBlock"></div>
      <button class="copy-btn" id="copyBtn">Copy Result</button>

      <button onclick="window.location.href='/'" style="width:100%;padding:12px;background:#1a1a2e;color:#aaaaaa;border:1px solid #333;border-radius:8px;font-size:14px;cursor:pointer;margin-top:8px;">Back to Home</button>

    </div>

    <script>
      function formatTime(ms) {
        var minutes = Math.floor(ms / 60000);
        var seconds = Math.floor((ms % 60000) / 1000);
        var millis = ms % 1000;
        return (String(minutes).padStart(2, '0') + ':' +
                String(seconds).padStart(2, '0') + '.' +
                String(millis).padStart(3, '0'));
      }

      function getParam(name) {
        var url = new URL(window.location.href);
        return url.searchParams.get(name);
      }

      var copyBlock = document.getElementById('copyBlock');
      var copyBtn = document.getElementById('copyBtn');

      var date = getParam('date') || 'Today';
      var isDNF = getParam('dnf') === 'true';
      var shareText = '';

      if (isDNF) {
        var failedGame = getParam('game') || 'Unknown';
        shareText = 'SPLITDLE\uD83C\uDFAE ' + date + '\nDNF -> Failed on: ' + failedGame + ' \uD83D\uDE2D';

      } else {
        var splitLines = '';

        for (var i = 1; i <= 4; i++) {
          var name = getParam('g' + i + 'name');
          var timeMs = getParam('g' + i + 'time');
          if (name && timeMs) {
            var formatted = formatTime(parseInt(timeMs));
            splitLines += '\u2705 ' + name + ': ' + formatted + '\n';
          }
        }

        var totalMs = parseInt(getParam('total') || '0');
        var totalFormatted = formatTime(totalMs);

        shareText = 'SPLITDLE\uD83C\uDFAE ' + date + '\n' + splitLines + 'Final Time: ' + totalFormatted + '\u231B';
      }

      copyBlock.textContent = shareText;

      copyBtn.addEventListener('click', function() {
        navigator.clipboard.writeText(shareText).then(function() {
          copyBtn.textContent = 'Copied!';
          copyBtn.classList.add('copied');
          setTimeout(function() {
            copyBtn.textContent = 'Copy Result';
            copyBtn.classList.remove('copied');
          }, 2000);
        });
      });
    </script>

  </body>
</html>
